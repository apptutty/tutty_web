[build]
  command   = "npm run build"
  publish   = "dist/tutty_web/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — Angular Router handles all navigation client-side
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache fingerprinted assets aggressively
[[headers]]
  for = "/chunk-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html — never cache so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
